<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Daanvi Technologies — Engineering Enterprise Technology</title>
    <meta name="description" content="Daanvi Technologies builds Agentic AI, Edge Intelligence, GreenTech, Web & Mobile, and Vertical AI solutions. Early-stage startup based in Bangalore, India." />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://daanvitech.com/" />
    <meta property="og:title"       content="Daanvi Technologies — Engineering Enterprise Technology" />
    <meta property="og:description" content="We build Agentic AI systems, Edge Intelligence, GreenTech platforms, and full-stack Web & Mobile solutions. Bangalore-based startup open to first-client partnerships." />
    <meta property="og:image"       content="https://daanvitech.com/og-cover.png" />
    <meta property="og:site_name"   content="Daanvi Technologies" />
    <meta property="og:locale"      content="en_IN" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Daanvi Technologies — Engineering Enterprise Technology" />
    <meta name="twitter:description" content="Agentic AI · Edge Intelligence · GreenTech · Web & Mobile. Bangalore startup seeking first-client partnerships." />
    <meta name="twitter:image"       content="https://daanvitech.com/og-cover.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./logo.png" />

    <!-- Page-loader styles inline so they render before React hydrates -->
    <style>
      #page-loader {
        position: fixed; inset: 0; z-index: 9999;
        background: #050816;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.65s ease, visibility 0.65s ease;
      }
      #page-loader.hidden { opacity: 0; visibility: hidden; }
      .ldr-scene { display: flex; flex-direction: column; align-items: center; gap: 28px; }
      .ldr-orbit-wrap { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
      .ldr-ring { position: absolute; border-radius: 50%; border: 1px solid transparent; }
      .ldr-ring-1 { width: 100%; height: 100%; border-color: rgba(34,211,238,0.2); animation: ldr-cw 3s linear infinite; }
      .ldr-ring-1::after { content: ''; position: absolute; width: 8px; height: 8px; border-radius: 50%; background: #22d3ee; box-shadow: 0 0 10px #22d3ee, 0 0 20px rgba(34,211,238,0.6); top: 50%; left: 0; transform: translate(-50%,-50%); }
      .ldr-ring-2 { width: 72%; height: 72%; border-color: rgba(37,99,235,0.25); border-style: dashed; animation: ldr-ccw 5s linear infinite; }
      .ldr-logo-core { width: 72px; height: 72px; border-radius: 50%; background: #050816; border: 1px solid rgba(34,211,238,0.25); display: flex; align-items: center; justify-content: center; animation: ldr-core-pulse 2s ease-in-out infinite; z-index: 2; }
      .ldr-logo-core img { width: 46px; height: 46px; object-fit: contain; }
      .ldr-text { text-align: center; animation: ldr-fade-up 0.7s ease 0.2s both; }
      .ldr-name { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.3px; margin-bottom: 6px; }
      .ldr-tagline { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.38); letter-spacing: 2px; text-transform: uppercase; }
      .ldr-dots { display: flex; gap: 8px; align-items: center; animation: ldr-fade-up 0.7s ease 0.4s both; }
      .ldr-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(34,211,238,0.6); animation: ldr-bounce 1.2s ease-in-out infinite; }
      .ldr-dots span:nth-child(2) { animation-delay: 0.18s; background: rgba(37,99,235,0.7); }
      .ldr-dots span:nth-child(3) { animation-delay: 0.36s; background: rgba(139,92,246,0.7); }
      .ldr-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); }
      .ldr-fill { height: 100%; background: linear-gradient(90deg,#22d3ee,#2563eb,#a78bfa); animation: ldr-fill 1.4s cubic-bezier(0.4,0,0.2,1) forwards; box-shadow: 0 0 12px rgba(34,211,238,0.7); }
      @keyframes ldr-cw  { to { transform: rotate(360deg); } }
      @keyframes ldr-ccw { to { transform: rotate(-360deg); } }
      @keyframes ldr-core-pulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.4), 0 0 30px rgba(34,211,238,0.1); }
        50%     { box-shadow: 0 0 0 12px rgba(34,211,238,0), 0 0 50px rgba(34,211,238,0.25); }
      }
      @keyframes ldr-fade-up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
      @keyframes ldr-bounce { 0%,80%,100% { transform:scale(0.8); opacity:0.5; } 40% { transform:scale(1.3); opacity:1; } }
      @keyframes ldr-fill { from { width:0 } to { width:100% } }
    </style>
  </head>
  <body>
    <!-- Page loader — hidden once React mounts -->
    <div id="page-loader">
      <div class="ldr-scene">
        <div class="ldr-orbit-wrap">
          <div class="ldr-ring ldr-ring-1"></div>
          <div class="ldr-ring ldr-ring-2"></div>
          <div class="ldr-logo-core">
            <img src="./logo.png" alt="Daanvi Technologies" />
          </div>
        </div>
        <div class="ldr-text">
          <div class="ldr-name">Daanvi Technologies</div>
          <div class="ldr-tagline">Engineering Enterprise Technology</div>
        </div>
        <div class="ldr-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="ldr-progress"><div class="ldr-fill"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Dismiss loader once page is fully interactive -->
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('page-loader');
          if (loader) loader.classList.add('hidden');
        }, 950);
      });
    </script>
  </body>
</html>
